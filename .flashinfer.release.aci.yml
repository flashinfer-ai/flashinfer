version: "2.0"

# ========================================================================
# FlashInfer PyPI 包发布 CI 配置
# 采用两阶段构建模式：先构建镜像（完成wheel编译），再上传制品
# 参考 deepkernel.release.yaml 验证成功的模式
# ========================================================================

parameters:
  # 基础构建镜像（包含 CUDA 工具链和 Python 依赖）
  base_image: reg.docker.alibaba-inc.com/aii/aistudio:15730151-20260109185657
  # 超时配置
  BUILD_TIMEOUT: 10800

stages:
  - 前置检查
  - 构建发布镜像
  - 构建制品
  - 发布正式库前检查
  - 发布正式库

jobs:
  # 前置检查 - STC安全扫描
  STC安全扫描:
    stage: 前置检查
    component: stc
    inputs:
      tenantName: null
    config:
      execute:
        isAllowSkip: false

  # 第一阶段：构建包含 wheel 的发布镜像
  # 在 docker build 过程中完成 wheel 编译，避免运行时触发 nvidia-container-runtime
  build_release_image:
    stage: 构建发布镜像
    component: docker-image-build
    id: build-image-release
    inputs:
      imageName: reg.docker.alibaba-inc.com/xgpu/flashinfer-release
      imageTag: ${{vcs.commitShortSha}}-${{pipeline.currentTimestamp}}
      dockerfile: ./Dockerfile.release
      contextDir: ./
      buildArgs: BASE_IMAGE=${{parameters.base_image}}
      compression: uncompressed
      forceCompression: false
      nydusSwitch: false
      nydusPreheat: ""
      cacheStrategy: always
      timeoutInSec: 10800

  # 第二阶段：从构建好的镜像中复制 wheel 并上传到 PyPI
  # 此时镜像已包含编译好的 wheel，只需复制文件，不触发 GPU runtime
  upload_pypi:
    stage: 构建制品
    id: build-upload-pypi
    component: pypi-artifact-uploader
    inputs:
      buildImage: ${{jobs.build-image-release.outputs.image}}
      buildCmd: "mkdir -p dist && cp /root/*.whl ./dist/ && ls -la dist/"
      workdir: "./"
      registry: "https://artifacts.antgroup-inc.cn/artifact/repositories/simple-dev/"
      timeout: ${{parameters.BUILD_TIMEOUT}}

  # 发布前检查 - 选择要迁移的制品
  选择迁移制品:
    id: check_artifact
    stage: 发布正式库前检查
    component: artifact-transfer-check
    inputs:
      artifactsConfigs:
        - artifacts: ${{jobs.build-upload-pypi.outputs.artifacts}}
          antArtifactRepo: simple

  # 同步到正式 PyPI 库
  同步至正式库:
    stage: 发布正式库
    component: ant-artifact-transfer
    inputs:
      transferArtifacts: ${{jobs.check_artifact.outputs.transferArtifacts}}
    config:
      beforeExecute:
        isAutoSkip: ${{jobs.check_artifact.outputs.selectedCount}} = 0
        confirm:
          buttonName: 确认发布正式库
          approvers:
            - fengdaozhuo.fdz

# 工作流依赖定义
workflow:
  stages:
    前置检查:
      requires: []
    构建发布镜像:
      requires:
        - 前置检查
    构建制品:
      requires:
        - 构建发布镜像
    发布正式库前检查:
      requires:
        - 构建制品
    发布正式库:
      requires:
        - 发布正式库前检查