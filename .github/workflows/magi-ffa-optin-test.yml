# Opt-in real-path tests for the MagiAttention Flex Flash Attention adapter
# (flashinfer/magi_ffa).
#
# WHY THIS IS SEPARATE / OPT-IN:
#   MagiAttention (SandAI, Apache-2.0) is an OPTIONAL dependency and is NOT part of
#   FlashInfer's requirements. The default PR CI therefore only runs the
#   dependency-free unit tests in tests/ffa (the real kernel path is skipped via
#   pytest.importorskip). This workflow exercises the REAL path by installing
#   MagiAttention on a Hopper GPU runner. It is intentionally:
#     - manual / scheduled only (workflow_dispatch + nightly schedule),
#     - NON-BLOCKING for PRs (it is its own workflow; it does not gate pr-test.yml).
#
# Runs inside the repo's CI image (flashinfer-ci-cu129, same as pr-test.yml) via
# ci/bash.sh, so PyTorch/CUDA build deps match the main CI. The install recipe
# (MagiAttention pin + nvidia-cutlass-dsl restore) lives in
# scripts/task_test_magi_ffa.sh.
#
# MAINTAINER TODO (could not be validated by the author's environment):
#   - Confirm the GPU runner label below (FFA's native kernel targets Hopper;
#     FFA_FA4 also covers Blackwell/Ampere — adjust if you want broader coverage).
#     The author verified the tests locally with magi_attention 1.1.0.post10 on H20.

name: MagiAttention FFA (opt-in real-path tests)

on:
  workflow_dispatch: {}
  # Uncomment to also run nightly once maintainers confirm runner availability:
  # schedule:
  #   - cron: "0 7 * * *"  # 07:00 UTC daily

concurrency:
  group: magi-ffa-optin-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Read Docker tag
    runs-on: ubuntu-latest
    outputs:
      docker_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Get Docker tag
        id: get-tag
        run: |
          TAG=$(grep 'flashinfer/flashinfer-ci-cu129:' ci/docker-tags.yml | cut -d':' -f2 | tr -d ' ')
          if [ -z "$TAG" ]; then
            echo "::error::Failed to extract Docker tag from ci/docker-tags.yml"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  magi-ffa-real-path:
    name: MagiAttention FFA real-path tests (Hopper)
    needs: setup
    # TODO(maintainer): confirm this self-hosted GPU runner label (Hopper).
    runs-on: [self-hosted, linux, x64, gpu, h100]
    timeout-minutes: 60
    env:
      DOCKER_IMAGE: flashinfer/flashinfer-ci-cu129:${{ needs.setup.outputs.docker_tag }}
    steps:
      - name: Cleanup
        run: |
          # Stop all Docker containers to free memory
          docker stop $(docker ps -q) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true
          # Clean workspace and caches
          sudo rm -rf ${{ github.workspace }}/* || true
          sudo rm -rf ${{ github.workspace }}/.[!.]* || true
          rm -rf ~/.cache/flashinfer_jit || true
          docker image prune -f || true
          docker builder prune -f --filter "until=24h" || true
          nvidia-smi || true

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Run MagiAttention FFA tests (real path)
        run: bash ci/bash.sh ${DOCKER_IMAGE} ./scripts/task_test_magi_ffa.sh
