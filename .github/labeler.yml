          - "flashinfer/cute_dsl/**"
          - "flashinfer/fused_moe/cute_dsl/**"
          - "flashinfer/gdn_kernels/**"
          - "flashinfer/norm/kernels/**"

"benchmark":
  - changed-files:
      - any-glob-to-any-file:
          - "benchmarks/**"

"docker":
  - changed-files:
      - any-glob-to-any-file:
          - "docker/**"
          - ".devcontainer/**"

"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"
